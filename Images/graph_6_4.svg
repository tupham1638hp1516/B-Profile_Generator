<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300">
<style>text { font-family: Arial, sans-serif; font-size: 14px; text-anchor: middle; dominant-baseline: central; }</style>
<rect width="100%" height="100%" fill="white"/>
<text x="250.0" y="25" font-size="16px" font-weight="bold">Biểu đồ Không gian Khoảng cách (Phân tách Ngày làm việc và Cuối tuần)</text>
<rect x="50" y="50" width="400" height="200" fill="none" stroke="#ddd" stroke-width="2"/>
<circle cx="150" cy="150" r="8" fill="#1f77b4"/>
<text x="150" y="130" fill="#333" font-weight="bold">Ngày 1</text>
<circle cx="180" cy="180" r="8" fill="#1f77b4"/>
<text x="180" y="160" fill="#333" font-weight="bold">Ngày 2</text>
<circle cx="220" cy="140" r="8" fill="#1f77b4"/>
<text x="220" y="120" fill="#333" font-weight="bold">Ngày 3</text>
<circle cx="400" cy="250" r="8" fill="#d62728"/>
<text x="400" y="230" fill="#333" font-weight="bold">Ngày 4 (Cuối tuần)</text>
<line x1="180" y1="180" x2="400" y2="250" stroke="#888" stroke-width="2" stroke-dasharray="5,5"/>
<text x="290" y="200" fill="#666" font-size="12px" transform="rotate(20 290 200)">Khoảng cách xa (155.3)</text>
<line x1="150" y1="150" x2="180" y2="180" stroke="#888" stroke-width="1" stroke-dasharray="2,2"/>
<text x="145" y="175" fill="#666" font-size="12px">Gần (15.2)</text>
</svg>